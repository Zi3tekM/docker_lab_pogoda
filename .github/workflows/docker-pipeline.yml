name: Docker Build, Test and Push

on:
  push:
    branches: [ "main", "master" ] # Uruchom, gdy wrzucasz kod na branch main lub master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_CACHE_REPO: zietekm812/docker-lab-pogoda

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Wymagane, aby GitHub pozwolił zapisać obraz w ghcr.io

    steps:
      # 1. Pobranie kodu aplikacji do maszyny w chmurze
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalacja emulatora (wymagane, by zbudować obraz na procesory ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Uruchomienie narzędzia do budowania obrazów (Buildx)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Logowanie do GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Logowanie do Docker Hub za pomocą przygotowanych sekretów
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Automatyczne generowanie tagów
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 7. Szybki build lokalny tylko na jedną architekturę potrzebny do testu CVE
      - name: Build local image for CVE testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: local-test-image:latest
          cache-from: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:cache-main

      # 8. Skanowanie bezpieczeństwa skanerem TRIVY
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '1' # Jeśli znajdzie błędy zatrzyma proces
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH' # Szukamy tylko błędów Wysokich i Krytycznych

      # 9. Ostateczny build i wysłanie gotowego obrazu
      - name: Build and push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true # Wysyłamy do ghcr.io
          tags: ${{ steps.meta.outputs.tags }}
          # Konfiguracja pamięci podręcznej (cache) na Docker Hubie w trybie max
          cache-from: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:cache-main
          cache-to: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:cache-main,mode=max
